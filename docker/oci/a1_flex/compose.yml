services:
  postgres:
    image: postgres:16.8
    container_name: loopin-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: meta_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - loopin-backend

  mongodb:
    image: mongo:8.0
    container_name: loopin-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: meta_db
    volumes:
      - mongo_data:/data/db
    networks:
      - loopin-backend

  redis:
    image: redis:7.4-alpine
    container_name: loopin-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    command: >
      redis-server --appendonly yes
                   --bind 0.0.0.0
                   --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    networks:
      - loopin-backend

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    container_name: loopin-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 256M
      - --default-log-level=warn
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://loopin-redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - loopin-redpanda:8082
      - --schema-registry-addr
      - 0.0.0.0:8081
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - loopin-redpanda:33145
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - loopin-backend

  app:
    image: ghcr.io/ita-loopin/loopin-app:${APP_IMAGE_TAG:-latest}
    container_name: loopin-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
      OCI_ACCESS_KEY: ${OCI_ACCESS_KEY}
      OCI_SECRET_KEY: ${OCI_SECRET_KEY}
      OCI_BUCKET_NAME: ${OCI_BUCKET_NAME}
      OCI_S3_ENDPOINT: ${OCI_S3_ENDPOINT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MONGODB_HOST: loopin-mongodb
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: loopin-redpanda:9092
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      MAIL_APP_PASSWORD: ${MAIL_APP_PASSWORD}
      GPT_API_KEY: ${GPT_API_KEY}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ../../../firebase-adminsdk.json:/app/firebase-adminsdk.json
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - loopin-backend
      - loopin-proxy

  nginx:
    image: nginx:alpine
    container_name: loopin-nginx
    restart: unless-stopped
    entrypoint: /docker-entrypoint-custom.sh
    environment:
      NGINX_DOMAIN: api.loopin.co.kr
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../../../nginx/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ../../../nginx/conf.d/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../../letsencrypt:/etc/letsencrypt
      - ../../../certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - loopin-proxy

  # 최초 인증서 발급 (한 번 실행 후 종료)
  certbot-init:
    image: certbot/certbot:v5.5.0
    container_name: loopin-certbot-init
    volumes:
      - ../../../letsencrypt:/etc/letsencrypt
      - ../../../certbot/www:/var/www/certbot
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -d /etc/letsencrypt/renewal ] && [ "$$(ls -A /etc/letsencrypt/renewal 2>/dev/null)" ]; then
          echo '[certbot-init] Certificates already exist. Skipping.'
          exit 0
        fi

        echo '[certbot-init] Waiting for nginx to be ready...'
        TRIES=0
        until wget -q --spider http://nginx:80/.well-known/acme-challenge/ 2>/dev/null || [ "$$TRIES" -ge 30 ]; do
          TRIES=$$((TRIES + 1))
          sleep 2
        done

        echo '[certbot-init] Requesting initial certificate...'
        rm -rf /etc/letsencrypt/live/api.loopin.co.kr
        rm -rf /etc/letsencrypt/archive/api.loopin.co.kr
        if certbot certonly --webroot --webroot-path=/var/www/certbot \
          -d api.loopin.co.kr \
          --email ${CERTBOT_EMAIL} \
          --agree-tos --non-interactive; then
          echo '[certbot-init] Certificate issued successfully.'
        else
          echo '[certbot-init] WARNING: certbot failed. Nginx will continue with the dummy certificate.'
          echo '[certbot-init] The renewal service will retry later.'
        fi
    depends_on:
      - nginx
    networks:
      - loopin-proxy

  # 12시간마다 인증서 갱신 시도 + 갱신 성공 시 nginx reload
  certbot:
    image: certbot/certbot:v5.5.0
    container_name: loopin-certbot
    restart: unless-stopped
    volumes:
      - ../../../letsencrypt:/etc/letsencrypt
      - ../../../certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    depends_on:
      - nginx

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: loopin-node-exporter
    restart: unless-stopped
    pid: host
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    networks:
      - loopin-monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: loopin-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - loopin-monitoring

  alloy:
    image: grafana/alloy:v1.9.0
    container_name: loopin-alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --stability.level=generally-available
    environment:
      PROMETHEUS_HOST: ${PROMETHEUS_HOST}
      LOKI_HOST: ${LOKI_HOST}
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - node-exporter
      - cadvisor
    networks:
      - loopin-monitoring
      - loopin-backend

volumes:
  postgres-data:
  mongo_data:
  redis-data:
  redpanda-data:
  alloy-data:

networks:
  loopin-backend:
    driver: bridge
  loopin-proxy:
    driver: bridge
  loopin-monitoring:
    driver: bridge
