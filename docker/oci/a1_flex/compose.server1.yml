services:
  nginx:
    image: nginx:alpine
    container_name: loopin-grafana-nginx
    restart: unless-stopped
    entrypoint: /docker-entrypoint-custom.sh
    environment:
      NGINX_DOMAIN: grafana.loopin.co.kr
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../../../nginx/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ../../../nginx/conf.d/grafana.conf:/etc/nginx/conf.d/default.conf:ro
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - grafana
    networks:
      - loopin-monitoring

  certbot-init:
    image: certbot/certbot:v5.5.0
    container_name: loopin-grafana-certbot-init
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -d /etc/letsencrypt/renewal ] && [ "$$(ls -A /etc/letsencrypt/renewal 2>/dev/null)" ]; then
          echo '[certbot-init] Certificates already exist. Skipping.'
          exit 0
        fi

        echo '[certbot-init] Waiting for nginx to be ready...'
        TRIES=0
        until wget -q --spider http://nginx:80/.well-known/acme-challenge/ 2>/dev/null || [ "$$TRIES" -ge 30 ]; do
          TRIES=$$((TRIES + 1))
          sleep 2
        done

        echo '[certbot-init] Requesting initial certificate...'
        rm -rf /etc/letsencrypt/live/grafana.loopin.co.kr
        rm -rf /etc/letsencrypt/archive/grafana.loopin.co.kr
        if certbot certonly --webroot --webroot-path=/var/www/certbot \
          -d grafana.loopin.co.kr \
          --email ${CERTBOT_EMAIL} \
          --agree-tos --non-interactive; then
          echo '[certbot-init] Certificate issued successfully.'
        else
          echo '[certbot-init] WARNING: certbot failed. Nginx will continue with the dummy certificate.'
          echo '[certbot-init] The renewal service will retry later.'
        fi
    depends_on:
      - nginx
    networks:
      - loopin-monitoring

  certbot:
    image: certbot/certbot:v5.5.0
    container_name: loopin-grafana-certbot
    restart: unless-stopped
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: loopin-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - loopin-monitoring

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: loopin-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - loopin-monitoring

  grafana:
    image: grafana/grafana:11.6.0
    container_name: loopin-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.loopin.co.kr
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      LOKI_HOST: ${LOKI_HOST}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - loopin-monitoring

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:

networks:
  loopin-monitoring:
    driver: bridge
