services:
  mongodb:
    image: mongo:8.0
    container_name: loopin-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: meta_db
    command: mongod --wiredTigerCacheSizeGB 0.128 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - loopin-data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    container_name: loopin-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 256M
      - --default-log-level=warn
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://${SERVER2_INTERNAL_IP}:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - ${SERVER2_INTERNAL_IP}:8082
      - --schema-registry-addr
      - 0.0.0.0:8081
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - ${SERVER2_INTERNAL_IP}:33145
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - loopin-data

volumes:
  mongo_data:
  redpanda-data:

networks:
  loopin-data:
    driver: bridge
