name: CD - OCI A1.Flex Deploy (Main)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '배포할 이미지 태그 (롤백 시 CI 실행 번호 입력, 기본값: latest)'
        required: false
        default: 'latest'

jobs:
  deploy-main:
    runs-on: ubuntu-22.04
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
      OCI_ACCESS_KEY: ${{ secrets.OCI_ACCESS_KEY }}
      OCI_SECRET_KEY: ${{ secrets.OCI_SECRET_KEY }}
      OCI_BUCKET_NAME: ${{ secrets.OCI_BUCKET_NAME }}
      OCI_S3_ENDPOINT: ${{ secrets.OCI_S3_ENDPOINT }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      POSTGRES_USERNAME: ${{ secrets.POSTGRES_USERNAME }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
      GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
      OAUTH_STATE_SECRET: ${{ secrets.OAUTH_STATE_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      FIREBASE_ADMIN_SDK_B64: ${{ secrets.FIREBASE_ADMIN_SDK_B64 }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      GHCR_USER: ${{ secrets.GHCR_USER }}
      CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
      PROMETHEUS_HOST: ${{ secrets.OCI_A1_S1_PRIVATE_IP }}
      LOKI_HOST: ${{ secrets.OCI_A1_S2_PRIVATE_IP }}
      APP_IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose files & deploy.sh to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          source: "docker/oci/a1_flex/compose.yml,docker/oci/a1_flex/monitoring/,deploy.sh,nginx/"
          target: "~/deploy/"

      - name: SSH 접속 및 배포
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          envs: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_BUCKET_NAME, OCI_ACCESS_KEY, OCI_SECRET_KEY, OCI_BUCKET_NAME, OCI_S3_ENDPOINT, JWT_SECRET_KEY, POSTGRES_USERNAME, POSTGRES_PASSWORD, MONGODB_USERNAME, MONGODB_PASSWORD, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, KAKAO_CLIENT_ID, NAVER_CLIENT_ID, NAVER_CLIENT_SECRET, MAIL_APP_PASSWORD, GPT_API_KEY, OAUTH_STATE_SECRET, GEMINI_API_KEY, REDIS_PASSWORD, FIREBASE_ADMIN_SDK_B64, GHCR_PAT, GHCR_USER, CERTBOT_EMAIL, PROMETHEUS_HOST, LOKI_HOST, APP_IMAGE_TAG
          script: |
            set -e
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd ~/deploy
            chmod +x deploy.sh
            export APP_IMAGE_TAG="${APP_IMAGE_TAG:-latest}"
            umask 077
            printf '%s' "$FIREBASE_ADMIN_SDK_B64" \
              | tr -d '\r\n' \
              | base64 --decode --ignore-garbage \
              > firebase-adminsdk.json
            COMPOSE_FILE=docker/oci/a1_flex/compose.yml DEPLOY_MODE=app ./deploy.sh
