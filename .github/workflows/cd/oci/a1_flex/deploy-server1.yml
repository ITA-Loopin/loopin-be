name: CD - OCI A1.Flex Deploy (Server1 - Monitoring)

on:
  workflow_dispatch:

jobs:
  deploy-server1:
    runs-on: ubuntu-22.04
    env:
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
      LOKI_HOST: ${{ secrets.OCI_A1_S2_PRIVATE_IP }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose files & deploy.sh to server1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_A1_S1_PRIVATE_IP }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.OCI_HOST }}
          proxy_username: ${{ secrets.OCI_USER }}
          proxy_key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          source: "docker/oci/a1_flex/compose.server1.yml,docker/oci/a1_flex/monitoring/,deploy.sh,nginx/"
          target: "~/deploy/"

      - name: SSH 접속 및 배포
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OCI_A1_S1_PRIVATE_IP }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.OCI_HOST }}
          proxy_username: ${{ secrets.OCI_USER }}
          proxy_key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          envs: GRAFANA_ADMIN_PASSWORD, CERTBOT_EMAIL, LOKI_HOST
          script: |
            set -e
            cd ~/deploy
            chmod +x deploy.sh
            COMPOSE_FILE=docker/oci/a1_flex/compose.server1.yml DEPLOY_MODE=monitoring ./deploy.sh
