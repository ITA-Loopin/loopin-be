services:
  postgres:
    image: postgres:16.8
    container_name: loopin-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: meta_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - loopin-backend

  redis:
    image: redis:7.4-alpine
    container_name: loopin-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    command: >
      redis-server --appendonly yes
                   --bind 0.0.0.0
                   --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    networks:
      - loopin-backend

  app:
    image: ghcr.io/ita-loopin/loopin-app:${APP_IMAGE_TAG:-latest}
    container_name: loopin-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
      OCI_ACCESS_KEY: ${OCI_ACCESS_KEY}
      OCI_SECRET_KEY: ${OCI_SECRET_KEY}
      OCI_BUCKET_NAME: ${OCI_BUCKET_NAME}
      OCI_S3_ENDPOINT: ${OCI_S3_ENDPOINT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MONGODB_HOST: ${MONGODB_HOST}
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      MAIL_APP_PASSWORD: ${MAIL_APP_PASSWORD}
      GPT_API_KEY: ${GPT_API_KEY}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./firebase-adminsdk.json:/app/firebase-adminsdk.json
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - loopin-backend
      - loopin-proxy

  nginx:
    image: nginx:alpine
    container_name: loopin-nginx
    restart: unless-stopped
    entrypoint: /docker-entrypoint-custom.sh
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - loopin-proxy

  # 최초 인증서 발급 (한 번 실행 후 종료)
  certbot-init:
    image: certbot/certbot:v5.5.0
    container_name: loopin-certbot-init
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c >
      "if [ ! -d /etc/letsencrypt/renewal ]; then
        echo '[certbot-init] Requesting initial certificate...';
        certbot certonly --webroot --webroot-path=/var/www/certbot
          -d api.loopin.co.kr
          --email ${CERTBOT_EMAIL}
          --agree-tos --non-interactive
          --force-renewal;
      else
        echo '[certbot-init] Certificates already exist. Skipping.';
      fi"
    depends_on:
      - nginx
    networks:
      - loopin-proxy

  # 12시간마다 인증서 갱신 시도 + 갱신 성공 시 nginx reload
  certbot:
    image: certbot/certbot:v5.5.0
    container_name: loopin-certbot
    restart: unless-stopped
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    depends_on:
      certbot-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:

networks:
  loopin-backend:
    driver: bridge
  loopin-proxy:
    driver: bridge
