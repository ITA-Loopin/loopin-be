limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_status 429;

server {
    listen 80;
    server_name api.loopin.co.kr;

    # Let's Encrypt 인증서 발급/갱신용 webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 HTTP 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.loopin.co.kr;

    ssl_certificate     /etc/letsencrypt/live/api.loopin.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.loopin.co.kr/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~ ^/rest-api/v1/auth/(login|signup-login|refresh-token)$ {
        limit_req zone=auth_limit burst=20 nodelay;

        proxy_pass         http://loopin-app:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # WebSocket support
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    3600s;
    }

    location / {
        proxy_pass         http://loopin-app:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # WebSocket support
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    3600s;
    }
}
